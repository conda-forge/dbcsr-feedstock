schema_version: 1

context:
  name: dbcsr
  version: "2.10.0"
  mpi: ${{ mpi if mpi else "openmpi" }}
  mpi_prefix: mpi_${{ mpi if mpi else "openmpi" }}

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  - url: https://github.com/cp2k/dbcsr/releases/download/v${{ version }}/dbcsr-${{ version }}.tar.gz
    sha256: 3d897220fbb4498215331efad6905eb7744881b4cf04eb5c5fb4db7c48a56ef9
    patches:
      - dbcsr-shared.patch

build:
  number: 0
  skip:
    - win
  string: ${{ mpi_prefix }}_h${{ hash }}_${{ build_number }}

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ compiler('fortran') }}
    - cmake
    - make
    - fypp
    - if: build_platform != host_platform and mpi == "openmpi"
      then: ${{ mpi }}
    - if: linux
      then: libgomp
    - if: osx
      then: llvm-openmp
  host:
    - if: linux
      then: libgomp
    - if: osx
      then: llvm-openmp
    - libblas
    - liblapack
    - ${{ mpi }}
  run:
    - ${{ mpi }}
  run_exports:
    - ${{ pin_subpackage(name, upper_bound='x') }}
    - ${{ name }} * ${{ mpi_prefix }}_*

tests:
  - script:
      - if: unix
        then:
          - test -e ${PREFIX}/include/dbcsr.h
          - test -e ${PREFIX}/include/dbcsr_api.mod
          - test -e ${PREFIX}/include/dbcsr_tensor.h
          - test -e ${PREFIX}/include/dbcsr_tensor_api.mod
          - test -e ${PREFIX}/lib/cmake/dbcsr/DBCSRConfig.cmake
          - test -e ${PREFIX}/lib/cmake/dbcsr/DBCSRConfigVersion.cmake
          - test -e ${PREFIX}/lib/cmake/dbcsr/DBCSRTargets-release.cmake
          - test -e ${PREFIX}/lib/cmake/dbcsr/DBCSRTargets.cmake
          - test -e ${PREFIX}/lib/libdbcsr${SHLIB_EXT}
          - test -e ${PREFIX}/lib/libdbcsr_c${SHLIB_EXT}

about:
  homepage: https://cp2k.github.io/dbcsr
  summary: DBCSR is a sparse matrix library designed to efficiently perform sparse matrix-matrix multiplication.
  description: DBCSR is a sparse matrix library designed to efficiently perform sparse matrix-matrix multiplication, among other operations. It is MPI and OpenMP parallel, and can exploit accelerators. DBCSR was developed as a part of CP2K, where it provides core functionality for linear scaling electronic structure 
    theory. It is now released as a standalone library for integration in other projects..
  license: GPL-2.0-only
  license_file: LICENSE
  repository: https://github.com/cp2k/dbcsr
  documentation: https://cp2k.github.io/dbcsr/develop/page/2-user-guide/index.html

extra:
  recipe-maintainers:
    - martin-g
